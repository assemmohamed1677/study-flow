<section class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>StudyFlow</h1>
      <p>Organize your study tasks and track your progress.</p>
    </div>

    <form [formGroup]="form" class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label for="email">Email</label>

        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
        />

        @if (emailInvalid) {
          <p class="error-control">Please enter a valid email address.</p>
        }
      </div>

      <div class="form-field">
        <label for="password">Password</label>

        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
        />

        @if (passwordInvalid) {
          <p class="error-control">
            Please enter a valid password with a minimum length of 6 characters.
          </p>
        }
      </div>

      <button type="submit" class="login-button">Login</button>
    </form>
  </div>
</section>
