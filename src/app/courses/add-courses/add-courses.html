<section class="course-form-card">
  <div class="form-header">
    <div>
      <p class="section-label">New Course</p>
      <h2>Create a course</h2>
      <p>Add a subject or skill you want to track inside StudyFlow.</p>
    </div>

    <button class="close-button" type="button" (click)="closeForm()" aria-label="Close form">
      X
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="course-form">
    <div class="form-field">
      <label for="title">Title</label>
      <input
        id="title"
        type="text"
        name="title"
        placeholder="e.g. Angular fundamentals"
        formControlName="title"
      />
    </div>

    <div class="form-field">
      <label for="description">Description</label>
      <textarea
        id="description"
        name="description"
        placeholder="What will you focus on in this course?"
        formControlName="description"
        rows="4"
      ></textarea>
    </div>

    <button type="submit">Create Course</button>
  </form>
</section>
